# Virtual hosts (production):
#   Frontend: https://devnex.arvidn.dev     (service: devnex)
#   API:      https://api-devnex.arvidn.dev (service: api)
#
# Server copies: backend/.env.prod, frontend/.env.prod (from *.example templates).
# Ensure backend/.env.prod has CORS_ORIGIN=https://devnex.arvidn.dev and
# frontend/.env.prod has NEXT_PUBLIC_SITE_URL / NEXT_PUBLIC_API_URL matching the URLs above.
#
services:
  devnex:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    container_name: devnex-frontend
    ports:
      - "80"
    env_file:
      - frontend/.env.prod
    restart: unless-stopped
    networks:
      - my-bridge-network

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: devnex-api
    env_file:
      - backend/.env.prod
    environment:
      - TZ=${TZ:-UTC}
      - NODE_ENV=production
      - VIRTUAL_HOST=${VIRTUAL_HOST}
      - VIRTUAL_PORT=${VIRTUAL_PORT}
    restart: unless-stopped
    networks:
      - my-bridge-network

networks:
  my-bridge-network:
    external: true
