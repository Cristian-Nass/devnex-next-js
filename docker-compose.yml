# Virtual hosts (nginx-proxy / similar):
#   web:  VIRTUAL_HOST + VIRTUAL_PORT in frontend/.env.prod  (e.g. devnex.arvidn.dev → 3000)
#   api:  VIRTUAL_HOST + VIRTUAL_PORT in backend/.env.prod   (e.g. api-devnex.arvidn.dev → 3001)
#
# Do not set VIRTUAL_* via compose `environment: ${VIRTUAL_HOST}` — Compose resolves that before
# env_file and overrides with empty strings. Put them only in the *.env.prod files below.
#
# Also set CORS_ORIGIN and NEXT_PUBLIC_* in those files (see *.example).
#
services:
  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    container_name: devnex-web
  
    env_file:
      - frontend/.env.prod
    # VIRTUAL_HOST / VIRTUAL_PORT must live in frontend/.env.prod (not here as ${VAR} — Compose
    # resolves those before env_file, so unset shell vars would blank them out).
    # Example values:
    #   VIRTUAL_HOST=devnex.arvidn.dev
    #   VIRTUAL_PORT=3000
    restart: unless-stopped
    networks:
      - my-bridge-network

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: devnex-api
    env_file:
      - backend/.env.prod
    # VIRTUAL_HOST / VIRTUAL_PORT must live in backend/.env.prod.
    # Example values:
    #   VIRTUAL_HOST=api-devnex.arvidn.dev
    #   VIRTUAL_PORT=3001
    environment:
      - TZ=${TZ:-UTC}
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - my-bridge-network

networks:
  my-bridge-network:
    external: true
