name: Sync blocks to web-viewer

# Runs whenever a push to master touches any file under the blocks folder
# or the shared PageRenderer. New block files are picked up automatically.
# Requires a secret WEB_VIEWER_SYNC_TOKEN — a GitHub PAT with `contents: write`
# permission on the Ardi83/web-viewer repository.

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/components/builder/blocks/**'
      - 'frontend/components/builder/viewer/PageRenderer.tsx'

concurrency:
  group: sync-blocks
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout devnex-next-js
        uses: actions/checkout@v4

      - name: Checkout web-viewer
        uses: actions/checkout@v4
        with:
          repository: Ardi83/web-viewer
          token: ${{ secrets.WEB_VIEWER_SYNC_TOKEN }}
          path: web-viewer

      - name: Copy shared block files
        run: |
          BLOCKS_SRC=frontend/components/builder/blocks
          BLOCKS_DST=web-viewer/next-site-template/components/blocks

          # Copy every file in the blocks folder — new blocks are included automatically.
          # registry.tsx is excluded: the web-viewer has its own registry (no builder metadata).
          for f in "$BLOCKS_SRC"/*.tsx; do
            filename=$(basename "$f")
            if [ "$filename" != "registry.tsx" ]; then
              cp "$f" "$BLOCKS_DST/$filename"
            fi
          done

          # PageRenderer is identical except for the BlockRenderer import path.
          sed "s|@/components/builder/blocks/registry|./blocks/registry|g" \
            frontend/components/builder/viewer/PageRenderer.tsx \
            > web-viewer/next-site-template/components/PageRenderer.tsx

      - name: Commit and push to web-viewer
        working-directory: web-viewer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add next-site-template/components/blocks/ next-site-template/components/PageRenderer.tsx

          if git diff --cached --quiet; then
            echo "No block changes to sync."
          else
            git commit -m "chore: sync blocks from devnex-next-js (${{ github.sha }})"
            git push
          fi
